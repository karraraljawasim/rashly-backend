services:
  postgres:
    image: postgres:18
    container_name: rashly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rashly_user
      POSTGRES_PASSWORD: rashly_password
      POSTGRES_DB: rashly_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:7
    container_name: rashly_redis
    restart: unless-stopped
    ports:
      - "6379:6379"


volumes:
  postgres-data: